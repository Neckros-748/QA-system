services:

    # --- PostgreSQL ---
    postgres:
        image: pgvector/pgvector:pg16
        restart: always
        environment:
            POSTGRES_USER:     ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB:       ${POSTGRES_DATABASE}
        healthcheck:
            test:         [
                "CMD-SHELL",
                "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"
            ]
            start_period: 10s
            interval:     5s
            timeout:      5s
            retries:      20
        ports:
            -   "5432:5432"
        volumes:
            -   sys-postgres-database:/var/lib/postgresql/data

volumes:
    sys-postgres-database:
